name: Publish npm package

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-publish-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out the released tag
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Set up Node and npm registry
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Use an OIDC-capable npm CLI
        run: npm install --global "npm@^11.5.1"

      - name: Verify tag and package version match
        shell: bash
        run: |
          package_version="$(node -p 'require("./package.json").version')"
          test "${{ github.event.release.tag_name }}" = "v${package_version}"

      - name: Install the release layout
        run: npm install --install-links=true

      - name: Test and typecheck
        run: |
          npm test
          npm run typecheck

      - name: Publish with npm Trusted Publishing
        run: npm publish --access public
