name: CI

on:
  push:
  pull_request:

# Cancel duplicate runs from simultaneous push+PR events.
# Uses the commit SHA as the dedup key: push gets github.sha,
# PR gets pull_request.head.sha — both are the same commit.
concurrency:
  group: ci-${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
  cancel-in-progress: true

jobs:
  test:
    name: Node 20 on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable pnpm
        run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Test (Windows — focused)
        if: runner.os == 'Windows'
        # Pre-existing baseline failures in unchanged Windows tests
        # (O_NOFOLLOW, SIGTERM, command fixtures) are outside this PR scope.
        # Run only the at-bot process-tree, command, prompt, and registration
        # tests that this PR introduces or modifies.
        run: >
          pnpm vitest run
          tests/unit/cli/at-bot-process.test.ts
          tests/unit/cli/at-bot.test.ts
          tests/unit/cli/index-registration.test.ts
          tests/unit/agent/bridge-system-prompt.test.ts
          tests/unit/agent/adapter-system-prompt-wiring.test.ts

      - name: Test (macOS / Ubuntu — full)
        if: runner.os != 'Windows'
        run: pnpm test

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

  package-smoke:
    name: npm package clean-install smoke
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Prepare npm release layout
        run: npm install --install-links=true

      - name: Pack
        id: pack
        shell: bash
        run: |
          pack_output="$(npm pack --silent)"
          printf '%s\n' "$pack_output"
          pack_file="$(printf '%s\n' "$pack_output" | tail -n 1)"
          echo "tarball=$PWD/$pack_file" >> "$GITHUB_OUTPUT"

      - name: Install and start packed CLI
        shell: bash
        run: |
          verify_dir="$(mktemp -d)"
          npm install \
            --prefix "$verify_dir" \
            --install-links=true \
            --ignore-scripts \
            "${{ steps.pack.outputs.tarball }}"
          installed="$verify_dir/node_modules/@penn.qp/lark-channel-bridge"
          expected="$(node -p 'require("./package.json").version')"
          actual="$(node "$installed/dist/cli.js" --version)"
          test "$actual" = "$expected"
          node -e '
            const root = process.argv[1];
            const channel = require(`${root}/node_modules/@larksuite/channel/package.json`);
            const sdk = require(`${root}/node_modules/@larksuiteoapi/node-sdk/package.json`);
            if (channel.version !== "0.4.0-qp.1") throw new Error(`unexpected channel ${channel.version}`);
            if (!sdk.version) throw new Error("missing channel SDK");
          ' "$installed"
